<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Code Vault</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- PrismJS Theme for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <!-- Background Elements -->
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>
    <div class="blob shape-3"></div>

    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1 class="glow-text">Python Code Vault</h1>
                    <p>A beautiful collection of Python snippets to share.</p>
                </div>
                <button id="add-snippet-btn" class="primary-btn pulse-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Add New Code</span>
                </button>
            </div>
        </header>

        <main id="snippet-grid" class="grid">
            <!-- Snippets injected here -->
        </main>

        <div id="empty-state" class="empty-state hidden">
            <p>Your vault is empty! Add your first code snippet to start sharing.</p>
        </div>
    </div>

    <!-- Modal for Full Code View -->
    <div id="code-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Code Snippet</h2>
                <button id="close-modal" class="icon-btn" aria-label="Close Modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <pre><code id="modal-code" class="language-sql"></code></pre>
            </div>
            <div class="modal-footer footer-actions">
                <div class="left-actions">
                    <button id="edit-btn" class="secondary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                        Edit
                    </button>
                    <button id="delete-btn" class="danger-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                        Delete
                    </button>
                </div>
                <div class="right-actions" style="display: flex; gap: 0.8rem;">
                    <button id="unlock-btn" class="primary-btn hidden" style="background: #eab308; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        Unlock Next
                    </button>
                    <button id="copy-btn" class="primary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                        Copy
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Form Modal for Adding/Editing Snippet -->
    <div id="form-modal" class="modal-overlay hidden">
        <div class="modal form-modal-container">
            <div class="modal-header">
                <h2 id="form-title">Add New Code</h2>
                <button id="close-form-btn" class="icon-btn" aria-label="Close Form">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="snippet-form">
                    <input type="hidden" id="form-id">
                    <div class="input-group">
                        <label for="form-title-input">Snippet Title</label>
                        <input type="text" id="form-title-input" placeholder="e.g. Create Users Table" required>
                    </div>
                    <div class="input-group">
                        <label for="form-lang-input">Language (e.g. python, javascript, sql)</label>
                        <input type="text" id="form-lang-input" placeholder="python" value="python" required>
                    </div>
                    <div class="input-group">
                        <label for="form-code-input">Code Content</label>
                        <textarea id="form-code-input" rows="10" placeholder="Type your code here..."
                            required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="save-btn" type="submit" form="snippet-form" class="primary-btn">Save Code</button>
            </div>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="toast hidden">Copied to clipboard!</div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
